# Production compose — requires .env with real secrets.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Required .env vars:
#   POSTGRES_PASSWORD, JWT_SECRET, DB_PASSWORD
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
#   R2_BUCKET_NAME, R2_PUBLIC_URL

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-dashboard
      - web-api
      - mobile-api
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: 5starmemo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web-api:
    build:
      context: .
      dockerfile: ./web-api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: 5starmemo
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: https://tusavor.com
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mobile-api:
    build:
      context: .
      dockerfile: ./mobile-api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: 5starmemo
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      WEB_API_URL: https://api.tusavor.com
      FRONTEND_URL: https://tusavor.com
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web-dashboard:
    build:
      context: .
      dockerfile: ./web-dashboard/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_WEB_API_URL: https://api.tusavor.com
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      - web-api
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
